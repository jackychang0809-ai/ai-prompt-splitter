<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Prompt Splitter | Project Genesis #10</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">
    <nav class="bg-white shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-2 flex justify-between items-center">
            <span class="font-bold text-blue-600">Article 3 System</span>
            <div class="flex gap-2 text-xs">
                <button class="px-2 py-1 bg-gray-200 rounded">EN</button>
                <button class="px-2 py-1 bg-blue-600 text-white rounded">繁中</button>
                <button class="px-2 py-1 bg-gray-200 rounded">JP</button>
                <button class="px-2 py-1 bg-gray-200 rounded">DE</button>
                <button class="px-2 py-1 bg-gray-200 rounded">ES</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 space-y-6">
        <div class="w-full h-24 bg-gray-200 flex items-center justify-center text-gray-400 border-dashed border-2 rounded-lg">
            ADVERTISEMENT SPACE (TOP)
        </div>

        <section class="bg-white p-6 rounded-2xl shadow-xl border border-gray-100">
            <h1 class="text-2xl font-black mb-2">AI Context Chunker</h1>
            <p class="text-sm text-gray-500 mb-6">解決「Lost in the Middle」痛點，隱私優先的純前端分割工具。</p>
            
            <textarea id="inputText" class="w-full h-48 p-4 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="請貼上長文本..."></textarea>
            
            <div class="mt-4 grid grid-cols-2 gap-4">
                <button id="splitBtn" class="bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 active:scale-95 transition-all">
                    立即分割 (Split)
                </button>
                <button id="clearBtn" class="border border-gray-300 py-4 rounded-xl font-bold hover:bg-gray-50 active:scale-95 transition-all">
                    清空 (Clear)
                </button>
            </div>
        </section>

        <div id="resultArea" class="space-y-4"></div>
    </main>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
