<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Prompt Splitter - The Premier Zero-Leak Context Chunker</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">
    <nav class="bg-white shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <span class="font-black text-blue-600 tracking-tight text-lg">AI Prompt Splitter</span>
            <div class="flex gap-2 text-xs font-medium">
                <button class="px-2 py-1 bg-gray-200 hover:bg-gray-300 rounded transition-colors text-gray-700">EN</button>
                <button class="px-2 py-1 bg-blue-600 text-white rounded transition-colors">繁中</button>
                <button class="px-2 py-1 bg-gray-200 hover:bg-gray-300 rounded transition-colors text-gray-700">JP</button>
                <button class="px-2 py-1 bg-gray-200 hover:bg-gray-300 rounded transition-colors text-gray-700">DE</button>
                <button class="px-2 py-1 bg-gray-200 hover:bg-gray-300 rounded transition-colors text-gray-700">ES</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 space-y-6 mt-2">
        <div class="w-full h-[90px] bg-gray-100 flex flex-col items-center justify-center text-gray-400 border-dashed border-2 rounded-xl overflow-hidden shadow-inner">
            <span class="text-[10px] uppercase tracking-widest mb-1 font-bold">Advertisement</span>
            <div class="text-xs italic font-serif">Responsive Ad Unit Placeholder</div>
        </div>

        <section class="bg-white p-6 md:p-8 rounded-2xl shadow-xl border border-gray-100">
            <h1 class="text-2xl md:text-3xl font-black mb-2 text-gray-900 tracking-tight">AI Prompt Splitter</h1>
            <p class="text-sm text-gray-500 mb-6 font-medium">The Premier Zero-Leak Context Chunker (隱私優先的純前端分割工具)</p>
            
            <textarea id="inputText" class="w-full h-48 p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all resize-y" placeholder="請貼上長文本..."></textarea>
            
            <div class="mt-4 grid grid-cols-2 gap-4">
                <button id="splitBtn" class="bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 active:scale-95 transition-all shadow-md hover:shadow-lg">
                    立即分割 (Split)
                </button>
                <button id="clearBtn" class="border-2 border-gray-200 py-4 rounded-xl font-bold hover:bg-gray-50 active:scale-95 transition-all text-gray-600">
                    清空 (Clear)
                </button>
            </div>
        </section>

        <div id="resultArea" class="space-y-4 pb-12"></div>
    </main>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
